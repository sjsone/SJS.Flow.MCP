privilegeTargets:
  'Neos\Flow\Security\Authorization\Privilege\Method\MethodPrivilege':
    "SJS.Flow.MCP:Everything":
      matcher: 'method(SJS\Flow\MCP\Controller\MCPController->.*Action())'

roles:
  "Neos.Flow:Everybody":
    privileges:
      - privilegeTarget: "SJS.Flow.MCP:Everything"
        permission: GRANT
